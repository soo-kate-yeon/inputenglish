name: Mobile Build & Submit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: 'Auto submit to store after build'
        required: false
        default: false
        type: boolean

env:
  WORKING_DIR: apps/mobile

jobs:
  build:
    name: Build (${{ github.event.inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.set-platform.outputs.platform }}
      profile: ${{ steps.set-profile.outputs.profile }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set platform
        id: set-platform
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
          else
            echo "platform=all" >> $GITHUB_OUTPUT
          fi

      - name: Set profile
        id: set-profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "profile=production" >> $GITHUB_OUTPUT
          fi

      - name: Type check
        run: pnpm --filter @inputenglish/mobile typecheck

      - name: Run tests
        run: pnpm --filter @inputenglish/mobile test
        continue-on-error: true

      - name: Build
        run: |
          eas build \
            --platform ${{ steps.set-platform.outputs.platform }} \
            --profile ${{ steps.set-profile.outputs.profile }} \
            --non-interactive
        working-directory: ${{ env.WORKING_DIR }}

  submit-ios:
    name: Submit to App Store
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event.inputs.auto_submit == 'true' || startsWith(github.ref, 'refs/tags/v')) &&
      (needs.build.outputs.platform == 'ios' || needs.build.outputs.platform == 'all') &&
      needs.build.outputs.profile == 'production'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store Connect
        run: eas submit --platform ios --latest --non-interactive
        working-directory: ${{ env.WORKING_DIR }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, submit-ios]
    if: always()

    steps:
      - name: Build result summary
        run: |
          echo "## Mobile Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ needs.build.outputs.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile**: ${{ needs.build.outputs.profile }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Submit**: ${{ needs.submit-ios.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
